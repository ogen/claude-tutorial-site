site_name: Claude 完整使用教學
site_description: 從零基礎到進階 Agent 開發的完整 Claude 教學，共 10 大模組、30 個章節。
site_author: Hokkaz
docs_dir: docs

theme:
  name: material
  language: zh-TW
  palette:
    - scheme: default
      primary: deep orange
      accent: orange
      toggle:
        icon: material/brightness-7
        name: 切換至深色模式
    - scheme: slate
      primary: deep orange
      accent: orange
      toggle:
        icon: material/brightness-4
        name: 切換至淺色模式
  font:
    text: Noto Sans TC
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - admonition
  - pymdownx.details
  - tables
  - toc:
      permalink: true

plugins:
  - search:
      lang: zh

nav:
  - 首頁: index.md

  - 模組一：認識 Claude 生態系:
    - 第 01 章：Claude 產品家族總覽: module1-overview/01_claude-product-family.md
    - 第 02 章：Claude 模型比較: module1-overview/02_claude-models.md

  - 模組二：Claude.ai 介面操作:
    - 第 03 章：基礎 Prompting 技巧: module2-claudeai/03_basic-prompting.md
    - 第 04 章：進階功能活用: module2-claudeai/04_advanced-features.md
    - 第 05 章：個人化設定: module2-claudeai/05_personalization.md

  - 模組三：Desktop + MCP 整合:
    - 第 06 章：Claude Desktop 安裝: module3-desktop-mcp/06_claude-desktop-install.md
    - 第 07 章：MCP 概念與架構: module3-desktop-mcp/07_mcp-concepts.md
    - 第 08 章：MCP 工具設定: module3-desktop-mcp/08_mcp-tools-setup.md

  - 模組四：Claude Code 開發環境:
